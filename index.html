  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333; }

    h2 { color: #1e40af; margin-top: 30px; }

<body>
  <h1>JSON Forge 隐私政策</h1>
  <p>最后更新日期：2026年4月</p>

  <h2>1. 数据收集</h2>
  <p>JSON Forge 不收集任何用户个人信息。应用完全在本地运行，不向任何服务器传输数据。</p>

  <h2>2. 文件访问</h2>
  <p>应用仅在用户主动打开或保存文件时访问本地文件系统，所有文件操作均由用户发起，数据不离开用户设备。</p>

  <h2>3. 网络访问</h2>
  <p>JSON Forge 不需要网络连接，不进行任何网络请求。</p>

  <h2>4. 第三方 SDK</h2>
  <p>应用基于 Electron 框架构建，不集成任何第三方数据分析或广告 SDK。</p>

  <h2>5. 联系方式</h2>
  <p>如有疑问，请通过 Microsoft Store 的"联系支持"功能与我们联系。</p>
</body>
</html>
